name: WakaTime Stats

on:
  schedule:
    # Roda automaticamente à meia-noite
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update this repo's README with WakaTime Stats
    runs-on: ubuntu-latest
    # Adicionamos esta permissão para o robô poder salvar o README:
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: WakaTime README Stats
        uses: athul/waka-readme@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          SHOW_TITLE: true
          BLOCKS: ⣀⣄⣤⣦⣶⣷⣿
          SHOW_TIME: true
          SHOW_TOTAL: true
